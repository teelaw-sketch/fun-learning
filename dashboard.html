<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FunLearning - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="app-body">
    <div class="app-container">
        <header class="dashboard-banner">
            <div class="banner-top-row">
                <div>
                    <p class="greeting-pre">Welcome back,</p>
                    <h2 id="student-greeting-name">STUDENT</h2>
                </div>
                <div class="streak-badge-container" id="streak-display-node">
                    🔥 <span id="streak-count-value">1</span> Day Streak
                </div>
            </div>
        </header>
        <main class="main-scrollable-content interactive-pop">
            <div class="center-action-wrapper">
                <button class="shadow-action-btn" onclick="window.location.href='learn.html'">New Lesson</button>
            </div>
            
            <div class="usage-status-card">
                <p>📊 Today's Lessons Free Quota Used: <strong id="dash-usage-count">0/20</strong></p>
            </div>

            <h3 class="section-title-label">Lesson History</h3>
            <div id="history-stack-container" class="history-list-stack">
                <div class="history-card-item">
                    <h4>Mathematics</h4>
                    <p class="subtopic-meta">Surds ➔ Laws of Surds, Rationalization</p>
                </div>
            </div>
        </main>
        
        <nav class="bottom-navigation-bar">
            <a href="dashboard.html" class="nav-tab active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span class="tab-lbl">Home</span>
            </a>
            <a href="learn.html" class="nav-tab">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                <span class="tab-lbl">Learn</span>
            </a>
            <a href="quiz.html" class="nav-tab">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                <span class="tab-lbl">Quiz</span>
            </a>
            <a href="group.html" class="nav-tab">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                <span class="tab-lbl">Group</span>
            </a>
        </nav>
    </div>
    <script src="app.js"></script>
    <script>
        document.getElementById("student-greeting-name").innerText = localStorage.getItem("activeStudent") || "Explorer";
        updateStreakInterfaceUI();
        syncUsageUI();
    </script>
</body>
</html>
