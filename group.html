<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FunLearning - Peer Lounge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="app-body">
    <div id="global-loading-indicator" class="loader-overlay" style="display: none;">
        <div class="spinner"></div>
        <p>Syncing secure communication pipelines...</p>
    </div>

    <div id="new-chat-modal" class="loader-overlay" style="display: none; background: rgba(0,0,0,0.5);">
        <div class="paywall-card interactive-pop" style="text-align: left;">
            <h3 style="margin-bottom: 12px; color: var(--brand-primary);">Start New Chat</h3>
            
            <div class="input-group">
                <label>Chat Mode</label>
                <select id="chat-type-select" onchange="toggleGroupTitleField()">
                    <option value="direct">👤 Direct 1-on-1 Message</option>
                    <option value="group">👥 Create Learning Group</option>
                </select>
            </div>

            <div class="input-group id-field-group">
                <label id="id-field-label">Friend's Unique Email Identity</label>
                <input type="text" id="target-identity-input" placeholder="example@student.com">
            </div>

            <div class="input-group" id="group-title-wrapper" style="display: none;">
                <label>Group Name</label>
                <input type="text" id="group-name-input" placeholder="e.g., Mathematics Study Clan">
            </div>

            <button class="prime-btn" style="margin-top: 10px;" onclick="createNewChatSession()">Launch Chat Grid</button>
            <button class="sub-btn-link" style="color: #666;" onclick="closeNewChatModal()">Cancel</button>
        </div>
    </div>

    <div class="app-container chat-layout-container">
        <div id="chat-list-landing" class="subview active" style="padding: 0; background: #FFFFFF;">
            <div class="whatsapp-chat-header" style="display: flex; justify-content: space-between; align-items: center;">
                <span>FunLearning Chats</span>
                <span id="my-identity-badge" style="font-size: 11px; font-weight: normal; background: rgba(255,255,255,0.2); padding: 4px 8px; border-radius: 12px;"></span>
            </div>

            <div id="empty-chat-state" class="interactive-pop" style="padding: 60px 30px; text-align: center; color: #888;">
                <div style="font-size: 50px; margin-bottom: 15px;">💬</div>
                <h4>Your Chat Screen is Clean</h4>
                <p style="font-size: 13px; margin-top: 6px; line-height: 1.4;">Tap the plus button below to message a peer or set up a collaborative study group with friends.</p>
            </div>

            <div id="threads-active-stack" class="history-list-stack" style="gap: 0; padding: 0;"></div>

            <button id="floating-plus-btn" onclick="openNewChatModal()" style="position: absolute; bottom: 95px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: #075E54; color: white; border: none; font-size: 28px; font-weight: 300; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer; z-index: 100;">+</button>
        </div>

        <div id="chat-window-arena" class="subview" style="padding: 0; display: none;">
            <div class="whatsapp-chat-header" style="display: flex; align-items: center; gap: 10px;">
                <button onclick="exitActiveChatWindow()" style="background: none; border: none; color: white; font-size: 20px; font-weight: bold; cursor: pointer; padding-right: 5px;">←</button>
                <div>
                    <h4 id="active-chat-title" style="font-size: 16px;">Chat Thread</h4>
                    <p id="active-chat-subtitle" style="font-size: 11px; font-weight: normal; opacity: 0.8;">Active matrix loop</p>
                </div>
            </div>

            <div id="chat-messages-timeline" class="chat-messages-timeline" style="background: #E5DDD5;"></div>

            <div class="whatsapp-input-footer-bar">
                <input type="text" id="chat-entry-field" class="chat-entry-field" placeholder="Type a message..." onkeypress="handleChatKeyPress(event)">
                <button class="chat-send-circular-btn" onclick="sendLoungeMessage()">➔</button>
            </div>
        </div>

        <nav class="bottom-navigation-bar">
            <a href="dashboard.html" class="nav-tab">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span class="tab-lbl">Home</span>
            </a>
            <a href="learn.html" class="nav-tab">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                <span class="tab-lbl">Learn</span>
            </a>
            <a href="quiz.html" class="nav-tab">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                <span class="tab-lbl">Quiz</span>
            </a>
            <a href="group.html" class="nav-tab active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-7.6-4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                <span class="tab-lbl">Group</span>
            </a>
        </nav>
    </div>

    <script src="app.js"></script>
    <script>
        // Local state trackers for structural mapping
        let activeChatId = null;
        let localChatThreads = JSON.parse(localStorage.getItem('savedChatThreads')) || [];

        // Show logged in identification text
        const currentEmail = localStorage.getItem("loggedInUserEmail") || "ID: Account Node";
        document.getElementById('my-identity-badge').innerText = currentEmail;

        function renderThreadListUI() {
            const emptyState = document.getElementById('empty-chat-state');
            const stack = document.getElementById('threads-active-stack');
            stack.innerHTML = "";

            if(localChatThreads.length === 0) {
                emptyState.style.display = "block";
                return;
            }
            emptyState.style.display = "none";

            localChatThreads.forEach(thread => {
                const row = document.createElement('div');
                row.style.cssText = "padding:16px; border-bottom:1px solid #EEE; background:#FFF; cursor:pointer; display:flex; flex-direction:column;";
                row.onclick = () => openActiveChatRoom(thread.id, thread.title, thread.subtitle);
                
                row.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <strong style="font-size:15px; color:#111;">${thread.title}</strong>
                        <span style="font-size:11px; color:#999;">Active</span>
                    </div>
                    <span style="font-size:12px; color:#666; margin-top:4px; text-overflow:ellipsis; overflow:hidden; white-space:nowrap;">${thread.subtitle}</span>
                `;
                stack.appendChild(row);
            });
        }

        function openNewChatModal() {
            document.getElementById('new-chat-modal').style.display = 'flex';
        }

        function closeNewChatModal() {
            document.getElementById('new-chat-modal').style.display = 'none';
            document.getElementById('target-identity-input').value = "";
            document.getElementById('group-name-input').value = "";
        }

        function toggleGroupTitleField() {
            const type = document.getElementById('chat-type-select').value;
            document.getElementById('group-title-wrapper').style.display = (type === 'group') ? 'block' : 'none';
            document.getElementById('id-field-label').innerText = (type === 'group') ? "Invite Friend's Email Address" : "Friend's Unique Email Identity";
        }

        function createNewChatSession() {
            const type = document.getElementById('chat-type-select').value;
            const targetId = document.getElementById('target-identity-input').value.trim();
            const groupName = document.getElementById('group-name-input').value.trim();

            if(!targetId) { alert("Please input a valid identity marker!"); return; }

            let title = targetId;
            let subtitle = "Direct 1-on-1 Session Network";

            if(type === 'group') {
                if(!groupName) { alert("Please define your Group name."); return; }
                title = groupName;
                subtitle = `Group Space • Admin: ${targetId}`;
            }

            const threadId = "chat_" + Date.now();
            const newThread = { id: threadId, title: title, subtitle: subtitle };
            
            localChatThreads.unshift(newThread);
            localStorage.setItem('savedChatThreads', JSON.stringify(localChatThreads));
            
            closeNewChatModal();
            renderThreadListUI();
            openActiveChatRoom(threadId, title, subtitle);
        }

        function openActiveChatRoom(id, title, subtitle) {
            activeChatId = id;
            document.getElementById('active-chat-title').innerText = title;
            document.getElementById('active-chat-subtitle').innerText = subtitle;
            
            document.getElementById('chat-list-landing').style.display = "none";
            document.getElementById('chat-window-arena').style.display = "flex";
            
            // Clear current chat display log & load specific channel streams
            document.getElementById('chat-messages-timeline').innerHTML = "";
            initializeLoungeSocket(); 
        }

        function exitActiveChatWindow() {
            activeChatId = null;
            document.getElementById('chat-window-arena').style.display = "none";
            document.getElementById('chat-list-landing').style.display = "flex";
            renderThreadListUI();
        }

        function handleChatKeyPress(event) {
            if (event.key === 'Enter') {
                sendLoungeMessage();
            }
        }

        // Run UI execution check
        renderThreadListUI();
    </script>
</body>
</html>
